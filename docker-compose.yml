services:
  app:
    build:
      context: ./app
    image: ${DOCKERHUB_USERNAME:-vijaykumarbiradar}/docker-assignment-app:latest
    container_name: docker-assignment-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-taskdb}
      DB_USER: ${MYSQL_USER:-taskuser}
      DB_PASSWORD: ${MYSQL_PASSWORD:-taskpass}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - taskapp-net
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: docker-assignment-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-taskdb}
      MYSQL_USER: ${MYSQL_USER:-taskuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-taskpass}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - taskapp-net
    restart: unless-stopped

  adminer:
    image: adminer:4
    container_name: docker-assignment-adminer
    ports:
      - "8081:8080"
    depends_on:
      - mysql
    networks:
      - taskapp-net
    restart: unless-stopped

networks:
  taskapp-net:
    driver: bridge

volumes:
  mysql-data:
